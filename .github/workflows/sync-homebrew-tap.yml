name: Publish npm and Sync Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish in Homebrew (e.g. 1.2.3)"
        required: false
        type: string
      publish_npm:
        description: "Publish to npm before syncing Homebrew"
        required: false
        default: false
        type: boolean
      publish_ui:
        description: "Publish optional @applica-software-guru/sdd-ui package"
        required: false
        default: false
        type: boolean

env:
  TAP_OWNER: applica-software-guru
  TAP_REPO: homebrew-sdd
  FORMULA_PATH: Formula/sdd.rb

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout sdd repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          else
            VERSION=$(node -p "require('./packages/cli/package.json').version")
          fi

          if [ -z "$VERSION" ]; then
            echo "Unable to resolve version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish-npm:
    runs-on: ubuntu-latest
    needs: resolve-version
    if: ${{ github.event_name == 'release' || github.event.inputs.publish_npm == 'true' }}

    steps:
      - name: Checkout sdd repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build core and CLI
        run: |
          npm run build --workspace @applica-software-guru/sdd-core
          npm run build --workspace @applica-software-guru/sdd

      - name: Publish workspaces to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_VERSION="${{ needs.resolve-version.outputs.version }}"
          PACKAGES=(
            "@applica-software-guru/sdd-core"
            "@applica-software-guru/sdd"
          )

          for PACKAGE in "${PACKAGES[@]}"; do
            if npm view "${PACKAGE}@${TARGET_VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE}@${TARGET_VERSION} already published, skipping"
              continue
            fi

            echo "Publishing ${PACKAGE}@${TARGET_VERSION}"
            if npm publish --workspace "${PACKAGE}" --access public; then
              continue
            fi

            echo "Failed to publish required package: ${PACKAGE}"
            exit 1
          done

      - name: Publish optional sdd-ui to npm
        if: ${{ github.event.inputs.publish_ui == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_UI || secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET_VERSION="${{ needs.resolve-version.outputs.version }}"
          PACKAGE="@applica-software-guru/sdd-ui"

          if npm view "${PACKAGE}@${TARGET_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${TARGET_VERSION} already published, skipping"
            exit 0
          fi

          npm publish --workspace "${PACKAGE}" --access public

      - name: Validate CLI version
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="${{ needs.resolve-version.outputs.version }}"
          ACTUAL=$(node -p "require('./packages/cli/package.json').version")

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Version mismatch: package.json=$ACTUAL, workflow=$EXPECTED"
            exit 1
          fi

  sync-homebrew-tap:
    runs-on: ubuntu-latest
    needs: [resolve-version, publish-npm]
    if: ${{ always() && needs.resolve-version.result == 'success' && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped') }}

    steps:
      - name: Checkout sdd repository
        uses: actions/checkout@v4

      - name: Build formula content
        id: formula
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.resolve-version.outputs.version }}"
          URL="https://registry.npmjs.org/@applica-software-guru/sdd/-/sdd-${VERSION}.tgz"

          for attempt in 1 2 3 4 5; do
            if curl -fsI "$URL" >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Tarball not available yet: $URL"
              exit 1
            fi

            sleep 8
          done

          SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula in tap repository
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.formula.outputs.version }}
          URL: ${{ steps.formula.outputs.url }}
          SHA256: ${{ steps.formula.outputs.sha256 }}
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const owner = process.env.TAP_OWNER;
            const repo = process.env.TAP_REPO;
            const path = process.env.FORMULA_PATH;
            const version = process.env.VERSION;
            const url = process.env.URL;
            const sha256 = process.env.SHA256;

            const formula = [
              'class Sdd < Formula',
              '  desc "CLI for Story Driven Development"',
              '  homepage "https://github.com/applica-software-guru/sdd"',
              `  url "${url}"`,
              `  sha256 "${sha256}"`,
              '  license "MIT"',
              '',
              '  depends_on "node"',
              '',
              '  def install',
              '    system "npm", "install", *std_npm_args',
              '    bin.install_symlink libexec.glob("bin/*")',
              '  end',
              '',
              '  test do',
              '    assert_match version.to_s, shell_output("#{bin}/sdd --version")',
              '  end',
              'end',
              '',
            ].join('\n');

            let currentSha;
            try {
              const { data } = await github.rest.repos.getContent({ owner, repo, path });
              currentSha = data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `Update sdd formula to ${version}`,
              content: Buffer.from(formula).toString('base64'),
              sha: currentSha,
            });

            core.info(`Updated ${owner}/${repo}:${path} to version ${version}`);
